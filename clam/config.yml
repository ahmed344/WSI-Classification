# CLAM-MB Configuration File

# Data paths
data_root: "/workspaces/WSI-Classification/data/HE-MYO/Processed"
checkpoint_dir: "checkpoints"
output_dir: "/workspaces/WSI-Classification/data/HE-MYO/Results"

# Feature source selection
# Choose which extracted feature set CLAM should load.
feature_model: "uni2h"
feature_model_suffixes:
  default: "_features.pt"
  hoptimus: "_features_hoptimus.pt"
  uni2h: "_features_uni2h.pt"

# Model architecture
input_dim: 1536
hidden_dim: 256
attention_hidden_dim: 256  # Intermediate dimension for attention network
attention_dim: 256  # Projection dimension for attention scoring
feature_projection_dropout: 0.3  # Dropout in shared input feature projection
attention_branch_feature_dropout: 0.3  # Dropout in attention branch feature extractors
clustering_branch_feature_dropout: 0.3  # Dropout in clustering branch feature extractor
final_classifier_dropout: 0.3  # Dropout in final classifier MLP
cluster_head_hidden_dim: 256  # Hidden dimension in clustering head MLP
num_classes: 5
k_clusters: 10

# Training parameters
batch_size: 64
epochs: 1000
lr_cls: 0.00001
lr_cluster: 0.01
weight_decay_cls: 0.001  # Weight decay for feature projection, attention branches, and classifier
weight_decay_cluster: 0.01  # Weight decay for clustering branch
clustering_weight_start: 0.01
clustering_weight_end: 0.5
clustering_warmup_epochs: 100
train_ratio: 0.8
min_epochs_before_early_stopping: 100
patience: 50
random_seed: 42

# Evaluation parameters
evaluation:
  split: "val"  # 'train' or 'val'
  plot_cm: true  # Plot confusion matrix

# Visualization parameters
visualization:
  split: "val"  # 'train' or 'val'
  max_slides: null  # null for all slides, or specify a number
  tile_size: 448

# Paths (can be overridden)
paths:
  checkpoint: null  # Will be set to checkpoints/best_model.pth if null
  evaluation_output: null  # Will use output_dir/evaluation_results if null
  attention_output: null  # Will use output_dir/attention_heatmaps if null

