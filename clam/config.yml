# CLAM-MB Configuration File

# Data paths
data_root: "/workspaces/WSI-Classification/data/HE-MYO/Processed"  # Root directory containing processed slide-level data
checkpoint_dir: "checkpoints"  # Directory where training checkpoints are saved
output_dir: "/workspaces/WSI-Classification/data/HE-MYO/Results"  # Directory for evaluation artifacts and visual outputs

# Feature source selection
# Choose which extracted feature set CLAM should load.
feature_model: "hoptimus"  # Active feature extractor name used to select feature files
feature_model_suffixes:  # Mapping from feature model names to filename suffixes
  default: "_features.pt"  # Suffix for the default feature set
  hoptimus: "_features_hoptimus.pt"  # Suffix for H-Optimus feature files
  uni2h: "_features_uni2h.pt"  # Suffix for UNI2-H feature files

# Model architecture
input_dim: 1536  # Input feature dimensionality consumed by CLAM
hidden_dim: 512  # Hidden dimensionality in shared embedding layers
attention_hidden_dim: 512  # Intermediate dimension for attention network
attention_dim: 512  # Projection dimension for attention scoring
feature_projection_dropout: 0.5  # Dropout in shared input feature projection
attention_branch_feature_dropout: 0.5  # Dropout in attention branch feature extractors
clustering_branch_feature_dropout: 0.5  # Dropout in clustering branch feature extractor
final_classifier_dropout: 0.5  # Dropout in final classifier MLP
cluster_head_hidden_dim: 512  # Hidden dimension in clustering head MLP
num_classes: 5  # Number of slide-level target classes
k_clusters: 10  # Number of top and bottom patches sampled for clustering supervision

# Training parameters
batch_size: 128  # Physical number of bags processed per micro-batch
gradient_accumulation_steps: 2  # Optimizer step frequency; effective batch size is batch_size * this value
max_tiles_per_tissue_train: 1024  # Randomly subsample training tissues above this tile count; null disables
max_tiles_per_tissue_val: null  # Validation tile cap; null keeps all tiles
epochs: 1000  # Maximum number of training epochs
lr_cls: 0.0001  # Initial learning rate for classification-related parameters
lr_cluster: 0.1  # Initial learning rate for clustering branch parameters
lr_scheduler_factor_cls: 0.5  # ReduceLROnPlateau factor for classification branch
lr_scheduler_patience_cls: 10  # ReduceLROnPlateau patience for classification branch
lr_scheduler_factor_cluster: 0.2  # ReduceLROnPlateau factor for clustering branch
lr_scheduler_patience_cluster: 5  # ReduceLROnPlateau patience for clustering branch
use_weighted_sampler: true  # If true, train DataLoader uses WeightedRandomSampler
use_class_weighted_loss: false  # If true, CrossEntropyLoss uses inverse-frequency class weights
best_checkpoint_metric: "balanced_accuracy"  # Options: balanced_accuracy, accuracy, loss, classification_loss, clustering_loss
weight_decay_cls: 0.01  # Weight decay for feature projection, attention branches, and classifier
weight_decay_cluster: 0.01  # Weight decay for clustering branch
clustering_weight_start: 0.1  # Initial weight applied to clustering loss
clustering_weight_end: 50.0  # Final clustering-loss weight after warmup
clustering_warmup_epochs: 20  # Epochs used to ramp clustering weight from start to end
train_ratio: 0.8  # Fraction of slides used for training split
min_epochs_before_early_stopping: 30  # Minimum epochs before early stopping checks begin
patience: 25  # Early stopping patience based on the selected checkpoint metric
random_seed: 42  # Random seed for deterministic data splitting and training behavior

# Visualization parameters
visualization:  # Settings controlling attention/diagnostic visualization outputs
  split: "val"  # 'train' or 'val'
  max_slides: null  # null for all slides, or specify a number
  tile_size: 448  # Pixel size used when rendering visualization tiles

# Paths (can be overridden)
paths:  # Optional explicit output/checkpoint paths overriding default derivations
  checkpoint: null  # Will be set to checkpoints/best_model.pth if null
  evaluation_output: null  # Will use output_dir/evaluation_results if null
  attention_output: null  # Will use output_dir/attention_heatmaps if null

